version: "3.9"

services:
  api:
    build: .
    container_name: openclaw_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/travel_agent
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - openclaw_net

  telegram_bot:
    build: .
    container_name: openclaw_telegram
    command: python -m bot.telegram_bot
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/travel_agent
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - api
      - postgres
      - redis
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - openclaw_net

  postgres:
    image: postgres:16-alpine
    container_name: openclaw_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: travel_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - openclaw_net

  redis:
    image: redis:7-alpine
    container_name: openclaw_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - openclaw_net

volumes:
  postgres_data:
  redis_data:

networks:
  openclaw_net:
    driver: bridge
